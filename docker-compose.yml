
services:
  mymaster01:
    build: .
    image: hadoop-ha:1.0
    container_name: mymaster01
    hostname: mymaster01
    ports:
    
      - "9878:9870" #nn UI
      - "8481:8480" # jn UI
      - "8081:8088" # yarn
     
    command: sleep infinity
    volumes:
      - ./config:/opt/hadoop/etc/hadoop
      - ./name/nn1:/opt/hadoop/dfs/name
      - ./journal/jn1:/opt/hadoop/dfs/journal
    networks:
      - cluster-network

  mymaster02:
    build: .
    image: hadoop-ha:1.0
    container_name: mymaster02
    hostname: mymaster02
    ports:      
      - "9879:9870" #nn UI
      - "8082:8088" # yarn
      - "8482:8480" # 
    command: sleep infinity
    volumes:
      - ./config:/opt/hadoop/etc/hadoop
      - ./name/nn2:/opt/hadoop/dfs/name
      - ./journal/jn2:/opt/hadoop/dfs/journal
    networks:
      - cluster-network

  myworker01:
    build: .
    image: hadoop-ha:1.0
    container_name: myworker01
    hostname: myworker01 
    ports:
      - "9861:9864"
    command: sleep infinity
    volumes:
      - ./config:/opt/hadoop/etc/hadoop
      - ./journal/jn1:/opt/hadoop/dfs/journal
      - ./example:/example
    networks:
      - cluster-network

  myworker02:
    build: .
    image: hadoop-ha:1.0
    container_name: myworker02
    hostname: myworker02    
    ports:
        - "9862:9864"
    command: sleep infinity
    volumes:
      - ./config:/opt/hadoop/etc/hadoop
      
      - ./example:/example
    networks:
      - cluster-network

  myworker03:
    build: .
    image: hadoop-ha:1.0
    container_name: myworker03
    hostname: myworker03   
    ports:
      - "9863:9864"
      - "8483:8480" # jn UI     
    command: sleep infinity
    volumes:
      - ./config:/opt/hadoop/etc/hadoop
      - ./journal/jn3:/opt/hadoop/dfs/journal
      - ./example:/example
    networks:
      - cluster-network

networks:
  cluster-network:
    driver: bridge
